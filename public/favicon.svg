<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Warm cream background circle -->
  <circle cx="32" cy="32" r="32" fill="#fffdf8"/>

  <!-- Coral accent circle top right -->
  <circle cx="50" cy="14" r="7" fill="#ffd6e7"/>

  <!-- Green accent circle bottom left -->
  <circle cx="14" cy="50" r="5" fill="#c8f0d8"/>

  <!-- Main coral background shape (squircle-ish) -->
  <rect x="8" y="8" width="48" height="48" rx="16" fill="#ff6b6b"/>

  <!-- Slightly offset cream layer for depth -->
  <rect x="10" y="10" width="46" height="46" rx="14" fill="#ff6b6b"/>

  <!-- JC initials -->
  <text
    x="32"
    y="42"
    font-family="Georgia, serif"
    font-size="26"
    font-weight="700"
    font-style="italic"
    fill="#fffdf8"
    text-anchor="middle"
    letter-spacing="-1"
  >JC</text>

  <!-- Small decorative dot -->
  <circle cx="48" cy="48" r="4" fill="#ffd166"/>
</svg>
